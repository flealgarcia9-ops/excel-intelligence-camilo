schema: spec-driven

context: |
  Tech stack: React 19 + Vite 5 + JavaScript (ES modules)
  Architecture: Single-page app with Excel data visualization dashboard
  Testing: Vitest (unit), jsdom environment
  Style: ESLint 9 (flat config), react-hooks, react-refresh
  Data: xlsx library for Excel parsing, chart.js + react-chartjs-2 for charts
  Python: tkinter GUI + game scripts (quien_millonario.py, gui_millonario.py)

strict_tdd: true

testing:
  runner:
    command: npm test
    framework: vitest
  layers:
    unit: { available: true, tool: vitest }
    integration: { available: false, tool: — }
    e2e: { available: false, tool: — }
  coverage:
    available: false
    command: —
  quality:
    linter: { available: true, command: npm run lint, tool: eslint }
    type_checker: { available: false, command: —, tool: — }
    formatter: { available: false, command: —, tool: — }

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
